<svg width="160" height="50" viewBox="0 0 160 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text { font: 600 24px 'Inter', sans-serif; fill: #E8ECF1; }
    </style>
  </defs>
  
  <!-- Centered Group -->
  <g transform="translate(10, 10)">
    <!-- Wordmark: dis -->
    <text x="0" y="20" class="text">dis</text>
    
    <!-- The "q" Brand Mark (Stand-alone icon) -->
    <!-- Positioned exactly between the two words -->
    <g transform="translate(35, 0)">
      <!-- Q Circle -->
      <path d="M8 6 A 8 8 0 1 1 7.9 6" fill="none" stroke="#E8ECF1" stroke-width="3" stroke-linecap="round" />
      <!-- Arrow Tail (The "Quote Going Down" mark) -->
      <path d="M14 14 L 20 22" stroke="#00D4A8" stroke-width="3" stroke-linecap="round" />
      <path d="M20 22 L 17 22 M 20 22 L 20 19" stroke="#00D4A8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    
    <!-- Wordmark: quote -->
    <text x="60" y="20" class="text">quote</text>
  </g>
</svg>
